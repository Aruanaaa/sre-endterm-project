global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: 'order-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['order-service:3003']
  - job_name: 'payment-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['payment-service:3006']
  - job_name: 'notification-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['notification-service:3007']
  - job_name: 'app-health'
    metrics_path: /health
    static_configs:
      - targets:
          - 'auth-service:3002'
          - 'product-service:3001'
          - 'user-service:3004'
          - 'chat-service:3005'
          - 'api-gateway:3008'
