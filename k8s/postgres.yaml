apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: sre-project
data:
  POSTGRES_DB: sre_db
  POSTGRES_USER: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: sre-project
type: Opaque
stringData:
  POSTGRES_PASSWORD: admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: sre-project
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef: { name: postgres-config }
            - secretRef: { name: postgres-secret }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sre-project
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
