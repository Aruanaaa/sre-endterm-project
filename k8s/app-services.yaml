apiVersion: apps/v1
kind: Deployment
metadata: { name: order-service, namespace: sre-project }
spec:
  replicas: 2
  selector: { matchLabels: { app: order-service } }
  template:
    metadata: { labels: { app: order-service } }
    spec:
      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 3003 }]
          env:
            - name: DATABASE_URL
              value: postgres://admin:admin@postgres:5432/sre_db
          readinessProbe: { httpGet: { path: /ready, port: 3003 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /health, port: 3003 }, initialDelaySeconds: 15, periodSeconds: 20 }
---
apiVersion: v1
kind: Service
metadata: { name: order-service, namespace: sre-project }
spec: { selector: { app: order-service }, ports: [{ port: 3003, targetPort: 3003 }] }
