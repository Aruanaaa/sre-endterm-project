apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sre-project
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 3002 }]
          readinessProbe: { httpGet: { path: /health, port: 3002 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /health, port: 3002 }, initialDelaySeconds: 15, periodSeconds: 20 }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: sre-project }
spec: { selector: { app: auth-service }, ports: [{ port: 3002, targetPort: 3002 }] }
---
